name: Deploy

# Auto-deploy to Cloudflare Workers on every push to main.
# Requires one repo secret: CLOUDFLARE_API_TOKEN (Settings -> Secrets and
# variables -> Actions). The account id lives in wrangler.jsonc, and the
# Worker's runtime secrets (ANTHROPIC/OPENROUTER/DATABASE/NEON_AUTH_*) are
# stored on Cloudflare and survive deploys, so nothing else is needed here.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys race; cancel an in-flight one when a newer push lands.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run deploy` runs the predeploy hook (build task content + copy the
      # Pyodide runtime, both gitignored) and then OpenNext build + wrangler deploy.
      - name: Build & deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
